<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FFF8F3">
    <title>Cita con Dios</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #FFF8F3;
            --gold: #D4AF37;
            --dark-blue: #003B5C;
            --black: #1a1a1a;
            --gray-light: #F5EFE8;
            --gray-lighter: #F9F6F3;
            --gray-muted: #E8E0F3;
            --gray-border: #E0D4C4;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--cream);
            color: var(--black);
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .screen {
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.4s ease;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Gender selection screen */
        .gender-screen {
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .gender-container {
            text-align: center;
            max-width: 90%;
        }

        .gender-container h1 {
            font-size: 28px;
            font-weight: 500;
            color: var(--black);
            margin-bottom: 12px;
        }

        .gender-container p {
            font-size: 14px;
            color: #666;
            margin-bottom: 40px;
        }

        .gender-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        button {
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--gold);
            color: var(--black);
            min-width: 140px;
        }

        .btn-primary:hover {
            box-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--dark-blue);
            border: 1px solid var(--dark-blue);
            width: 100%;
        }

        .btn-secondary:hover {
            background: var(--gray-muted);
        }

        /* Intro screen */
        .intro-screen {
            justify-content: space-between;
            padding: 24px 20px;
        }

        .intro-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
        }

        .intro-content h1 {
            font-size: 24px;
            font-weight: 500;
            color: var(--gold);
            margin-bottom: 24px;
            text-align: center;
        }

        .intro-content .phrase {
            font-size: 16px;
            color: var(--black);
            line-height: 1.8;
            text-align: center;
            margin-bottom: 20px;
            font-style: italic;
        }

        .completed-dates {
            background: var(--gray-muted);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            text-align: center;
        }

        .completed-dates p {
            font-size: 13px;
            color: var(--dark-blue);
            margin: 0;
        }

        .completed-dates strong {
            font-weight: 600;
        }

        .intro-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        /* Session screen */
        .session-screen {
            padding: 24px 20px 80px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .progress-section {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--gray-border);
        }

        .progress-text {
            font-size: 13px;
            color: var(--dark-blue);
            font-weight: 500;
            margin: 0 0 8px;
        }

        .progress-bar {
            background: var(--gray-muted);
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            background: var(--gold);
            height: 100%;
            transition: width 0.3s ease;
        }

        .session-header {
            font-size: 20px;
            font-weight: 500;
            color: var(--gold);
            margin-bottom: 8px;
            text-align: center;
        }

        .session-duration {
            font-size: 13px;
            color: var(--dark-blue);
            text-align: center;
            margin-bottom: 20px;
        }

        .process-box {
            background: var(--gray-light);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--dark-blue);
        }

        .process-box p {
            font-size: 14px;
            color: var(--black);
            line-height: 1.7;
            margin: 0;
            white-space: pre-wrap;
        }

        .prayer-toggle {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            color: var(--dark-blue);
            background: var(--gray-muted);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 16px;
            text-align: left;
            transition: background 0.2s;
        }

        .prayer-toggle:hover {
            background: #DCD0EB;
        }

        .prayer-box {
            background: var(--gray-lighter);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid var(--gold);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                max-height: 0;
            }
            to {
                opacity: 1;
                max-height: 1000px;
            }
        }

        .prayer-box p {
            font-size: 15px;
            color: var(--black);
            line-height: 1.8;
            margin: 0;
            white-space: pre-wrap;
            font-style: italic;
        }

        .session-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--cream);
            padding: 16px 20px;
            border-top: 1px solid var(--gray-border);
            display: flex;
            gap: 12px;
            max-width: 100%;
        }

        .session-footer button {
            flex: 1;
            padding: 14px;
            font-size: 16px;
        }

        /* Completed screen */
        .completed-screen {
            justify-content: space-between;
            padding: 24px 20px;
            align-items: center;
        }

        .completed-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            width: 100%;
            text-align: center;
        }

        .completed-content h1 {
            font-size: 28px;
            font-weight: 500;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .completed-content p {
            font-size: 16px;
            color: var(--black);
            margin-bottom: 24px;
            line-height: 1.7;
        }

        .completed-dates-display {
            background: var(--gray-muted);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .completed-dates-display p {
            font-size: 15px;
            color: var(--dark-blue);
            font-weight: 500;
            margin: 0;
        }

        .completed-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .completed-buttons button {
            width: 100%;
            padding: 16px;
            font-size: 16px;
        }

        @media (max-width: 480px) {
            .gender-buttons {
                flex-direction: column;
            }

            .gender-buttons button {
                width: 100%;
                min-width: unset;
            }
        }

        /* Notch support */
        @supports (padding: max(0px)) {
            .session-screen {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: max(24px, env(safe-area-inset-top));
            }

            .session-footer {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-bottom: max(16px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Gender selection -->
        <div class="screen gender-screen active" id="genderScreen">
            <div class="gender-container">
                <h1>Cita con Dios</h1>
                <p>Elige tu género para comenzar</p>
                <div class="gender-buttons">
                    <button class="btn-primary" onclick="selectGender('hombre')">Hombre</button>
                    <button class="btn-primary" onclick="selectGender('mujer')">Mujer</button>
                </div>
            </div>
        </div>

        <!-- Intro -->
        <div class="screen intro-screen" id="introScreen">
            <div class="intro-content">
                <h1>Cita con Dios</h1>
                <p class="phrase" id="openingPhrase"></p>
                <div class="completed-dates" id="completedDatesContainer" style="display: none;">
                    <p><strong>CITAS COMPLETADAS:</strong> <span id="completedDatesList"></span></p>
                </div>
            </div>
            <div class="intro-buttons">
                <button class="btn-primary" onclick="startSession()" style="width: 100%;">Comenzar la sesión 1</button>
                <button class="btn-secondary" onclick="selectGender(null)">Cambiar género</button>
            </div>
        </div>

        <!-- Session -->
        <div class="screen session-screen" id="sessionScreen">
            <div class="progress-section">
                <p class="progress-text" id="progressText"></p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <h2 class="session-header" id="sessionActivity"></h2>
            <p class="session-duration" id="sessionDuration"></p>

            <div class="process-box">
                <p id="sessionProcess"></p>
            </div>

            <div id="prayerContainer"></div>

            <div style="height: 20px;"></div>
        </div>

        <!-- Completed -->
        <div class="screen completed-screen" id="completedScreen">
            <div class="completed-content">
                <h1>¡Completado!</h1>
                <p>Hoy completé mi Cita con Dios, y de esta semana lo he hecho los días:</p>
                <div class="completed-dates-display">
                    <p id="completedDatesFinal"></p>
                </div>
                <button class="btn-secondary" onclick="shareWhatsApp()" style="margin-bottom: 12px;">Compartir por WhatsApp</button>
            </div>
            <div class="completed-buttons">
                <button class="btn-primary" onclick="restartCycle()" style="width: 100%;">Iniciar de nuevo</button>
            </div>
        </div>

        <!-- Session footer (fixed) -->
        <div class="session-footer" id="sessionFooter" style="display: none;">
            <button class="btn-primary" id="nextSessionBtn" onclick="nextSession()"></button>
        </div>
    </div>

    <script>
        const sessions = [
            {
                duration: 5,
                activity: "Apertura de la cita con Dios",
                process: "Enciendes vela, pones el vaso de agua, respiras y oras en voz alta",
                prayer: "Dios, esta es nuestra cita.\nNo vengo solo a pedirte cosas.\nVengo a escucharte, a ordenarme, a recordar quién soy y a caminar contigo."
            },
            {
                duration: 7,
                activity: "Limpieza del deseo",
                process: "Escribes las preguntas y sus respuestas: \n¿Qué quiero manifestar? \n¿Desde dónde lo estoy pidiendo? \n¿Esto nace de mi alma o de mi herida? \n¿A quién bendice este milagro?",
                prayer: "Dios, limpia mi deseo.\nQuita de él la vanidad, la urgencia, la comparación, el miedo y la necesidad de demostrar.\nDeja solamente lo que sea verdadero, amoroso y alineado con mi alma."
            },
            {
                duration: 10,
                activity: "Petición del milagro",
                process: "Se hace la oración central",
                prayer: null // Dynamic
            },
            {
                duration: 10,
                activity: "Meditación de coherencia",
                process: "Mano en corazón.\nRespiras.\nSientes gratitud antes de ver resultados.",
                prayer: null // Dynamic
            },
            {
                duration: 10,
                activity: "Escritura intuitiva",
                process: "Escribes las preguntas y escribe la respuesta de lo primero que te venta a la mente, sin juzgar: \nDios, ¿qué quieres que sepa hoy?\nDios, ¿qué estoy intentando controlar?\nDios, ¿qué debo soltar?\nDios, ¿qué debo hacer?\nDios, ¿qué parte de mí ya está lista para recibir?",
               
                prayer: null
            },
            {
                duration: 8,
                activity: "Decretos de identidad",
                process: "Usamos decretos más conectados con Dios",
                prayer: null // Dynamic
            },
            {
                duration: 4,
                activity: "Diario de milagros y cierre",
                process: "Escribes:\n\nHoy vi a Dios en…\nHoy agradezco…\nHoy suelto…\nHoy confío en…",
                prayer: null // Dynamic
            }
        ];

        let gender = null;
        let currentSessionIndex = 0;
        let completedDates = JSON.parse(localStorage.getItem('citaDiosDates')) || [];
        let prayerVisible = {};

        function selectGender(g) {
            gender = g;
            updateSessions();
            if (g) {
                showScreen('introScreen');
            } else {
                showScreen('genderScreen');
                prayerVisible = {};
            }
        }

        function updateSessions() {
            const suffix = gender === 'mujer' ? 'a' : '';
            const article = gender === 'mujer' ? 'a' : '';

            // Session 3: Petición del milagro
            sessions[2].prayer = `Dios amado, hoy pongo en tus manos este milagro: (Declara el milagro que quieres manifestar).\nNo te lo entrego desde la exigencia, sino desde la fe.\nNo te pido que obedezcas mi miedo, te pido que ordenes mi camino.\nSi esto es para mi mayor bien, ábrelo.\nSi hay algo mejor, muéstramelo.\nSi todavía no estoy ${gender === 'hombre' ? 'listo' : 'lista'}, prepárame.\nSi debo actuar, guíame.\nSi debo esperar, fortaléceme.\nSi debo soltar, sostenme.\nQue este milagro no solo me bendiga a mí, sino que bendiga a todos los que toque mi vida.`;

            // Session 4: Meditación de coherencia
            sessions[3].prayer = `Repites:\n"Gracias porque ya estoy siendo guiad${suffix}.\nGracias porque Dios ya está obrando.\nGracias porque mi cuerpo aprende a confiar.\nGracias porque mi mente se ordena.\nGracias porque mi corazón se abre."\n\nDespués visualizas la escena cumplida, pero sin ansiedad.`;

            // Session 6: Decretos de identidad
            sessions[5].prayer = `Yo soy un${article} hij${article} amad${suffix} de Dios.\n\nYo soy un${article} ${gender === 'mujer' ? 'mujer' : 'hombre'} guiad${suffix}, sostenid${suffix} y bendecid${suffix}.\n\nYo soy dign${suffix} de recibir milagros sin pagar con sufrimiento.\n\nYo soy prósper${suffix} porque mi alma está al servicio del amor.\n\nYo soy capaz de sostener lo que estoy pidiendo.\n\nYo soy obediente a la guía divina.\n\nYo soy libre de la culpa por crecer.\n\nYo soy libre de la necesidad de controlar.\n\nYo soy canal de bienestar, abundancia, sabiduría y amor.\n\nYo soy un${article} ${gender === 'mujer' ? 'mujer' : 'hombre'} que camina con Dios y por eso no camina sol${suffix}.`;

            // Session 7: Cierre
            sessions[6].prayer = `Dios, gracias por esta cita.\nGracias porque no tengo que rogar lo que el amor ya está preparando.\nGracias porque no estoy sol${suffix}.\nGracias porque mis milagros no nacen de mi ansiedad, sino de mi comunión contigo.\nYo hago mi parte.\nTú haces lo que solo Tú sabes hacer.\nLo dejo en tus manos, pero camino con el corazón abierto.\nAmén. Así es. Hecho está.`;

            const openingPhrase = gender === 'hombre'
                ? "No vengo a convencer a Dios de darme algo; vengo a convertirme en el hombre que puede recibirlo, sostenerlo y usarlo para el bien."
                : "No vengo a convencer a Dios de darme algo; vengo a convertirme en la mujer que puede recibirlo, sostenerlo y usarlo para el bien.";

            document.getElementById('openingPhrase').textContent = openingPhrase;
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');

            if (screenId === 'sessionScreen') {
                renderSession();
                document.getElementById('sessionFooter').style.display = 'flex';
            } else {
                document.getElementById('sessionFooter').style.display = 'none';
            }

            if (screenId === 'introScreen') {
                updateCompletedDates();
            }

            if (screenId === 'completedScreen') {
                updateCompletedDatesFinal();
            }

            // Scroll to top
            setTimeout(() => {
                const screen = document.getElementById(screenId);
                if (screen) screen.scrollTop = 0;
            }, 0);
        }

        function updateCompletedDates() {
            const container = document.getElementById('completedDatesContainer');
            const list = document.getElementById('completedDatesList');

            if (completedDates.length > 0) {
                list.textContent = completedDates.join(', ');
                container.style.display = 'block';
            } else {
                container.style.display = 'none';
            }
        }

        function updateCompletedDatesFinal() {
            const today = new Date().toLocaleDateString('es-ES', { weekday: 'long' });            
            let dates = [...completedDates];
            if (!dates.includes(today)) {
                dates.push(today);
            }
            document.getElementById('completedDatesFinal').textContent = dates.join(', ');
        }

        function startSession() {
            currentSessionIndex = 0;
            prayerVisible = {};
            showScreen('sessionScreen');
        }

        function renderSession() {
            const session = sessions[currentSessionIndex];
            const totalSessions = sessions.length;
            const progress = ((currentSessionIndex + 1) / totalSessions) * 100;

            document.getElementById('progressText').textContent = `${currentSessionIndex + 1}/${totalSessions} completado`;
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('sessionActivity').textContent = session.activity;
            document.getElementById('sessionDuration').textContent = `⏱ ${session.duration} minutos`;
            document.getElementById('sessionProcess').textContent = session.process;

            const prayerContainer = document.getElementById('prayerContainer');
            prayerContainer.innerHTML = '';

            if (session.prayer) {
                const isVisible = prayerVisible[currentSessionIndex] || false;

                const toggleBtn = document.createElement('button');
                toggleBtn.className = 'prayer-toggle';
                toggleBtn.textContent = isVisible ? '▼ Ocultar oración' : '▶ Ver oración';
                toggleBtn.onclick = () => togglePrayer(currentSessionIndex);

                prayerContainer.appendChild(toggleBtn);

                if (isVisible) {
                    const prayerBox = document.createElement('div');
                    prayerBox.className = 'prayer-box';
                    const prayerText = document.createElement('p');
                    prayerText.textContent = session.prayer;
                    prayerBox.appendChild(prayerText);
                    prayerContainer.appendChild(prayerBox);
                }
            }

            const isLastSession = currentSessionIndex === totalSessions - 1;
            document.getElementById('nextSessionBtn').textContent = isLastSession ? 'Completar' : 'Avanzar';
        }

        function togglePrayer(index) {
            prayerVisible[index] = !prayerVisible[index];
            renderSession();
        }

        function nextSession() {
            if (currentSessionIndex < sessions.length - 1) {
                currentSessionIndex++;
                renderSession();
            } else {
                // Mark today as completed
                const today = new Date().toLocaleDateString('es-ES', { weekday: 'long' });
                if (!completedDates.includes(today)) {
                    completedDates.push(today);
                    localStorage.setItem('citaDiosDates', JSON.stringify(completedDates));
                }
                showScreen('completedScreen');
            }
        }

        function restartCycle() {
            currentSessionIndex = 0;
            prayerVisible = {};
            showScreen('sessionScreen');
        }

        function shareWhatsApp() {
            const dates = document.getElementById('completedDatesFinal').textContent;
            const message = `Hoy completé mi *Cita con Dios*, y de esta semana lo he hecho los días: ${dates}`;
            const encodedMsg = encodeURIComponent(message);
            window.open(`https://wa.me/?text=${encodedMsg}`, '_blank');
        }
    </script>
</body>
</html>
